<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>body{background:#111;display:flex;justify-content:center;padding:30px;}</style>
</head><body>
<!--
  HORNADY CUSTOM GRADE FULL-LENGTH SIZING DIE
  All features symmetric about centerline x=150

  Component half-widths (±) from x=150:
    Decapping rod tip   : ± 2   → x 148–152
    Rod lock collar     : ± 5   → x 145–155
    Die body (all)      : ±17   → x 133–167
    Knurl zone          : ±17   → x 133–167  (same dia, textured)
    Sure-Loc lock ring  : ±26   → x 124–176  (thin hex, low profile)
    Thread section      : ±17   → x 133–167
    Bore hidden         : ± 5   → x 145–155

  Y layout (top→bottom):
    28–36  : decapping rod
    36–42  : rod lock collar (knurled mini collar)
    42–76  : die body upper smooth  (34px)
    76–116 : knurl grip zone        (40px ≈ 1")
    116–122: Sure-Loc lock ring     (6px ≈ 1/4")
    122–206: thread section         (84px ≈ 1.5" at scale)
    206–212: 45° chamfer lead-in
    212     : case entry flat
-->
<svg viewBox="0 0 380 295" width="760" height="590" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr"    markerWidth="8" markerHeight="6" refX="8"  refY="3"   orient="auto"          markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z"   fill="#D8DCF0"/></marker>
  <marker id="arr-r"  markerWidth="8" markerHeight="6" refX="0"  refY="3"   orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#D8DCF0"/></marker>
  <marker id="arr-sm" markerWidth="6" markerHeight="5" refX="6"  refY="2.5" orient="auto"          markerUnits="strokeWidth"><path d="M0,0 L0,5 L6,2.5 z" fill="#D8DCF0"/></marker>
  <marker id="arr-bl" markerWidth="6" markerHeight="5" refX="6"  refY="2.5" orient="auto"          markerUnits="strokeWidth"><path d="M0,0 L0,5 L6,2.5 z" fill="#4090FF"/></marker>

  <!-- DIAMOND KNURL — coarse crosshatch, symmetric 5px tile -->
  <pattern id="knurl-coarse" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
    <line x1="0" y1="6" x2="6" y2="0" stroke="#D8DCF0" stroke-width="0.55" opacity="0.5"/>
    <line x1="0" y1="0" x2="6" y2="6" stroke="#D8DCF0" stroke-width="0.55" opacity="0.5"/>
  </pattern>
  <!-- FINE KNURL for rod collar -->
  <pattern id="knurl-fine" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
    <line x1="0" y1="3" x2="3" y2="0" stroke="#D8DCF0" stroke-width="0.4" opacity="0.5"/>
    <line x1="0" y1="0" x2="3" y2="3" stroke="#D8DCF0" stroke-width="0.4" opacity="0.5"/>
  </pattern>

  <!-- GRADIENTS — symmetric highlight, all x1=0 x2=1 -->
  <linearGradient id="g-body" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#4A5260"/>
    <stop offset="8%"   stop-color="#909AA8"/>
    <stop offset="22%"  stop-color="#BCC4CC"/>
    <stop offset="42%"  stop-color="#8890A0"/>
    <stop offset="68%"  stop-color="#464E5C"/>
    <stop offset="88%"  stop-color="#2A3240"/>
    <stop offset="100%" stop-color="#3E4650"/>
  </linearGradient>
  <linearGradient id="g-knurl-body" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#424A58"/>
    <stop offset="10%"  stop-color="#808898"/>
    <stop offset="25%"  stop-color="#A8B0B8"/>
    <stop offset="45%"  stop-color="#787E8C"/>
    <stop offset="70%"  stop-color="#3E4650"/>
    <stop offset="88%"  stop-color="#262E3C"/>
    <stop offset="100%" stop-color="#383E4C"/>
  </linearGradient>
  <!-- Sure-Loc ring: thin hex, slightly brighter to pop -->
  <linearGradient id="g-sureloc" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#383E4C"/>
    <stop offset="12%"  stop-color="#7A8290"/>
    <stop offset="28%"  stop-color="#AEB6BE"/>
    <stop offset="45%"  stop-color="#686E7C"/>
    <stop offset="60%"  stop-color="#8A9098"/>
    <stop offset="75%"  stop-color="#505860"/>
    <stop offset="88%"  stop-color="#2E3640"/>
    <stop offset="100%" stop-color="#464C58"/>
  </linearGradient>
  <linearGradient id="g-rod" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#505860"/>
    <stop offset="30%"  stop-color="#9298A0"/>
    <stop offset="60%"  stop-color="#606870"/>
    <stop offset="100%" stop-color="#404850"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="380" height="295" fill="#1C1C24"/>

<!-- Title bar -->
<rect x="0" y="0" width="380" height="20" fill="#12121A"/>
<text x="190" y="13" text-anchor="middle" fill="#C8D0E8"
      font-size="7.5" font-family="Arial Narrow, Arial, sans-serif"
      font-weight="bold" letter-spacing="1.2">
  HORNADY CUSTOM GRADE  ·  FULL-LENGTH SIZING DIE  ·  7/8–14 TPI  ·  .308 WIN
</text>
<line x1="0" y1="20" x2="380" y2="20" stroke="#D8DCF0" stroke-width="0.4" opacity="0.25"/>

<!-- ═══════════════════════════════════════
     CENTERLINE  x=150
     ═══════════════════════════════════════ -->
<line x1="150" y1="22" x2="150" y2="220"
      stroke="#4090FF" stroke-width="0.5"
      stroke-dasharray="10,2,2,2" opacity="0.55"/>

<!-- ═══════════════════════════════════════
     1. DECAPPING ROD TIP  y=28–36
        ±2 → x=148–152  (4px wide)
     ═══════════════════════════════════════ -->
<rect x="148" y="28" width="4" height="8"
      fill="url(#g-rod)" stroke="#D8DCF0" stroke-width="0.8"/>

<!-- ═══════════════════════════════════════
     2. ROD LOCK COLLAR (knurled)  y=36–46
        ±5 → x=145–155  (10px wide, 10px tall)
        Fine knurl for finger tightening
     ═══════════════════════════════════════ -->
<rect x="145" y="36" width="10" height="10"
      fill="url(#g-rod)" stroke="#D8DCF0" stroke-width="0.9"/>
<!-- Fine knurl overlay -->
<rect x="146" y="37" width="8" height="8" fill="url(#knurl-fine)" opacity="0.6"/>
<!-- Shoulder chamfers where collar meets body below -->
<line x1="145" y1="46" x2="142" y2="50" stroke="#D8DCF0" stroke-width="0.6"/>
<line x1="155" y1="46" x2="158" y2="50" stroke="#D8DCF0" stroke-width="0.6"/>

<!-- ═══════════════════════════════════════
     3. DIE BODY UPPER (smooth)  y=46–76
        ±17 → x=133–167  (34px)
        Chamfer at top shoulder
        "HORNADY" + "308 WIN" engraved
     ═══════════════════════════════════════ -->
<rect x="133" y="46" width="34" height="30"
      fill="url(#g-body)" stroke="#D8DCF0" stroke-width="1.3"/>
<!-- Top shoulder chamfers (symmetric) -->
<line x1="133" y1="46" x2="138" y2="51" stroke="#D8DCF0" stroke-width="0.7"/>
<line x1="167" y1="46" x2="162" y2="51" stroke="#D8DCF0" stroke-width="0.7"/>
<!-- Bright machined edge highlight (left) -->
<line x1="134.2" y1="47" x2="134.2" y2="75" stroke="#D8DCF0" stroke-width="0.3" opacity="0.55"/>
<!-- HORNADY engraving (centered, upper smooth section) -->
<text x="150" y="59" text-anchor="middle" fill="#D8DCF0"
      font-size="4.5" font-family="Arial Narrow, Arial, sans-serif"
      font-weight="bold" letter-spacing="1" opacity="0.5">HORNADY</text>
<!-- Caliber engraving -->
<text x="150" y="69" text-anchor="middle" fill="#D8DCF0"
      font-size="4" font-family="Arial Narrow, Arial, sans-serif"
      letter-spacing="0.5" opacity="0.4">308 WIN</text>

<!-- ═══════════════════════════════════════
     4. KNURLED GRIP ZONE  y=76–116
        ±17 → x=133–167  (same dia as body)
        Coarse diamond knurl
        Top and bottom edges have knurl runout lines
     ═══════════════════════════════════════ -->
<!-- Base fill (gradient) -->
<rect x="133" y="76" width="34" height="40"
      fill="url(#g-knurl-body)" stroke="#D8DCF0" stroke-width="1.3"/>
<!-- Knurl runout boundary lines (top and bottom of knurl zone) -->
<line x1="133" y1="80" x2="167" y2="80" stroke="#D8DCF0" stroke-width="0.6" opacity="0.55"/>
<line x1="133" y1="112" x2="167" y2="112" stroke="#D8DCF0" stroke-width="0.6" opacity="0.55"/>
<!-- Diamond knurl overlay (between runout lines) -->
<rect x="134" y="80" width="32" height="32" fill="url(#knurl-coarse)" opacity="0.55"/>
<!-- Machined edge highlight -->
<line x1="134.2" y1="77" x2="134.2" y2="115" stroke="#D8DCF0" stroke-width="0.3" opacity="0.4"/>

<!-- ═══════════════════════════════════════
     5. HORNADY SURE-LOC LOCK RING  y=116–124
        ±26 → x=124–176  (52px wide, 8px tall)
        Thin hex split-clamp collar
        6 flat sides: chamfer corners at ±19 from 150
        Split gap visible on right face
        Allen set screw on right face
     ═══════════════════════════════════════ -->
<rect x="124" y="116" width="52" height="8"
      fill="url(#g-sureloc)" stroke="#D8DCF0" stroke-width="1.2"/>
<!-- Left hex chamfers (150-26=124, inner flat at 150-19=131) -->
<line x1="124" y1="116" x2="131" y2="120" stroke="#D8DCF0" stroke-width="0.8"/>
<line x1="124" y1="124" x2="131" y2="120" stroke="#D8DCF0" stroke-width="0.8"/>
<!-- Right hex chamfers (150+26=176, inner flat at 150+19=169) -->
<line x1="176" y1="116" x2="169" y2="120" stroke="#D8DCF0" stroke-width="0.8"/>
<line x1="176" y1="124" x2="169" y2="120" stroke="#D8DCF0" stroke-width="0.8"/>
<!-- Facet dividers (symmetric ±19) -->
<line x1="131" y1="116" x2="131" y2="124" stroke="#D8DCF0" stroke-width="0.4" opacity="0.45"/>
<line x1="169" y1="116" x2="169" y2="124" stroke="#D8DCF0" stroke-width="0.4" opacity="0.45"/>
<!-- Split gap (right side — a thin dark slot through the ring) -->
<line x1="172" y1="116" x2="172" y2="124" stroke="#0A0A14" stroke-width="1.2"/>
<!-- Allen set screw (right face — small circle with hex socket) -->
<circle cx="174" cy="120" r="2.5" fill="#1A1A24" stroke="#D8DCF0" stroke-width="0.7"/>
<!-- Hex socket (tiny 6-point, just dots at vertices) -->
<circle cx="174" cy="120" r="0.8" fill="#4090FF"/>

<!-- ═══════════════════════════════════════
     6. THREAD SECTION  y=124–206
        ±17 → x=133–167  (same dia as body)
        OD = outer edges
        Minor dia dashed = ±13 → x=137, x=163
        Crest lines every ~4px (14 TPI scaled)
     ═══════════════════════════════════════ -->
<rect x="133" y="124" width="34" height="82"
      fill="url(#g-body)" stroke="#D8DCF0" stroke-width="1.3"/>
<!-- Bright edge highlight -->
<line x1="134.2" y1="125" x2="134.2" y2="205" stroke="#D8DCF0" stroke-width="0.3" opacity="0.45"/>
<!-- Minor diameter (thread root) dashed lines (symmetric ±13) -->
<line x1="137" y1="124" x2="137" y2="206"
      stroke="#D8DCF0" stroke-width="0.6" stroke-dasharray="3,2" opacity="0.4"/>
<line x1="163" y1="124" x2="163" y2="206"
      stroke="#D8DCF0" stroke-width="0.6" stroke-dasharray="3,2" opacity="0.4"/>
<!-- Thread crest lines (every 4px, 20 lines over 82px) -->
<line x1="133" y1="128" x2="167" y2="128" stroke="#D8DCF0" stroke-width="0.45" opacity="0.55"/>
<line x1="133" y1="132" x2="167" y2="132" stroke="#D8DCF0" stroke-width="0.45" opacity="0.55"/>
<line x1="133" y1="136" x2="167" y2="136" stroke="#D8DCF0" stroke-width="0.45" opacity="0.55"/>
<line x1="133" y1="140" x2="167" y2="140" stroke="#D8DCF0" stroke-width="0.45" opacity="0.55"/>
<line x1="133" y1="144" x2="167" y2="144" stroke="#D8DCF0" stroke-width="0.45" opacity="0.55"/>
<line x1="133" y1="148" x2="167" y2="148" stroke="#D8DCF0" stroke-width="0.45" opacity="0.55"/>
<line x1="133" y1="152" x2="167" y2="152" stroke="#D8DCF0" stroke-width="0.45" opacity="0.55"/>
<line x1="133" y1="156" x2="167" y2="156" stroke="#D8DCF0" stroke-width="0.45" opacity="0.55"/>
<line x1="133" y1="160" x2="167" y2="160" stroke="#D8DCF0" stroke-width="0.45" opacity="0.55"/>
<line x1="133" y1="164" x2="167" y2="164" stroke="#D8DCF0" stroke-width="0.45" opacity="0.55"/>
<line x1="133" y1="168" x2="167" y2="168" stroke="#D8DCF0" stroke-width="0.45" opacity="0.55"/>
<line x1="133" y1="172" x2="167" y2="172" stroke="#D8DCF0" stroke-width="0.45" opacity="0.55"/>
<line x1="133" y1="176" x2="167" y2="176" stroke="#D8DCF0" stroke-width="0.45" opacity="0.55"/>
<line x1="133" y1="180" x2="167" y2="180" stroke="#D8DCF0" stroke-width="0.45" opacity="0.55"/>
<line x1="133" y1="184" x2="167" y2="184" stroke="#D8DCF0" stroke-width="0.45" opacity="0.55"/>
<line x1="133" y1="188" x2="167" y2="188" stroke="#D8DCF0" stroke-width="0.45" opacity="0.55"/>
<line x1="133" y1="192" x2="167" y2="192" stroke="#D8DCF0" stroke-width="0.45" opacity="0.55"/>
<line x1="133" y1="196" x2="167" y2="196" stroke="#D8DCF0" stroke-width="0.45" opacity="0.55"/>
<line x1="133" y1="200" x2="167" y2="200" stroke="#D8DCF0" stroke-width="0.45" opacity="0.55"/>

<!-- 45° lead-in chamfer (symmetric ±9 at base → x=141–159) -->
<line x1="133" y1="206" x2="141" y2="212" stroke="#D8DCF0" stroke-width="1.0"/>
<line x1="167" y1="206" x2="159" y2="212" stroke="#D8DCF0" stroke-width="1.0"/>
<!-- Case entry bore face (x=141–159) -->
<line x1="141" y1="212" x2="159" y2="212" stroke="#D8DCF0" stroke-width="1.2"/>

<!-- ═══════════════════════════════════════
     HIDDEN BORE  (symmetric ±5 → x=145, x=155)
     ═══════════════════════════════════════ -->
<line x1="145" y1="46" x2="145" y2="212"
      stroke="#D8DCF0" stroke-width="0.65" stroke-dasharray="5,3" opacity="0.35"/>
<line x1="155" y1="46" x2="155" y2="212"
      stroke="#D8DCF0" stroke-width="0.65" stroke-dasharray="5,3" opacity="0.35"/>

<!-- ═══════════════════════════════════════
     DIMENSIONS
     ═══════════════════════════════════════ -->

<!-- Overall die body height (y=46–212) left side -->
<line x1="131" y1="46"  x2="90" y2="46"  stroke="#D8DCF0" stroke-width="0.65"/>
<line x1="131" y1="212" x2="90" y2="212" stroke="#D8DCF0" stroke-width="0.65"/>
<line x1="94" y1="48" x2="94" y2="210"
      stroke="#D8DCF0" stroke-width="0.75"
      marker-start="url(#arr-r)" marker-end="url(#arr)"/>
<text x="91" y="132" text-anchor="middle" fill="#C8D0E8" font-size="7.5"
      font-family="Arial Narrow, Arial, sans-serif"
      transform="rotate(-90,91,132)">~2.75"</text>

<!-- Body diameter (above body): x=133–167 -->
<line x1="133" y1="46" x2="133" y2="34" stroke="#D8DCF0" stroke-width="0.65"/>
<line x1="167" y1="46" x2="167" y2="34" stroke="#D8DCF0" stroke-width="0.65"/>
<line x1="135" y1="37" x2="165" y2="37"
      stroke="#D8DCF0" stroke-width="0.75"
      marker-start="url(#arr-r)" marker-end="url(#arr)"/>
<text x="150" y="35" text-anchor="middle" fill="#C8D0E8" font-size="7"
      font-family="Arial Narrow, Arial, sans-serif">7/8"</text>

<!-- Sure-Loc ring width: x=124–176 -->
<line x1="124" y1="124" x2="124" y2="134" stroke="#D8DCF0" stroke-width="0.65"/>
<line x1="176" y1="124" x2="176" y2="134" stroke="#D8DCF0" stroke-width="0.65"/>
<line x1="126" y1="131" x2="174" y2="131"
      stroke="#D8DCF0" stroke-width="0.75"
      marker-start="url(#arr-r)" marker-end="url(#arr)"/>
<text x="150" y="130" text-anchor="middle" fill="#C8D0E8" font-size="6.5"
      font-family="Arial Narrow, Arial, sans-serif" dy="-1.5">~1.25"</text>

<!-- ═══════════════════════════════════════
     LEADER CALLOUTS  (right side)
     ═══════════════════════════════════════ -->
<g font-family="Arial Narrow, Arial, sans-serif">

  <!-- 1. Decapping rod + lock collar -->
  <line x1="155" y1="41" x2="200" y2="44" stroke="#D8DCF0" stroke-width="0.75" marker-end="url(#arr-sm)"/>
  <line x1="200" y1="44" x2="372" y2="44" stroke="#D8DCF0" stroke-width="0.45" opacity="0.3"/>
  <text x="202" y="41" fill="#C8D0E8" font-size="8" font-weight="bold">DECAPPING ROD  +  LOCK COLLAR</text>
  <text x="202" y="50" fill="#7080A8" font-size="6.5">Knurled collar · adjusts pin depth</text>

  <!-- 2. Die body smooth + engraving -->
  <line x1="167" y1="59" x2="200" y2="63" stroke="#D8DCF0" stroke-width="0.75" marker-end="url(#arr-sm)"/>
  <line x1="200" y1="63" x2="372" y2="63" stroke="#D8DCF0" stroke-width="0.45" opacity="0.3"/>
  <text x="202" y="60" fill="#C8D0E8" font-size="8" font-weight="bold">DIE BODY  ·  7/8" Ø  ·  SMOOTH</text>
  <text x="202" y="69" fill="#7080A8" font-size="6.5">Roll-stamped "HORNADY" + caliber</text>

  <!-- 3. Knurl grip zone -->
  <line x1="167" y1="96" x2="200" y2="96" stroke="#D8DCF0" stroke-width="0.75" marker-end="url(#arr-sm)"/>
  <line x1="200" y1="96" x2="372" y2="96" stroke="#D8DCF0" stroke-width="0.45" opacity="0.3"/>
  <text x="202" y="93" fill="#C8D0E8" font-size="8" font-weight="bold">KNURLED GRIP ZONE</text>
  <text x="202" y="102" fill="#7080A8" font-size="6.5">Coarse diamond knurl · hand-tighten</text>

  <!-- 4. Sure-Loc ring -->
  <line x1="176" y1="120" x2="200" y2="118" stroke="#4090FF" stroke-width="0.75" marker-end="url(#arr-bl)"/>
  <line x1="200" y1="118" x2="372" y2="118" stroke="#4090FF" stroke-width="0.45" opacity="0.3"/>
  <text x="202" y="115" fill="#4090FF" font-size="8" font-weight="bold">HORNADY SURE-LOC™ LOCK RING</text>
  <text x="202" y="124" fill="#5070A8" font-size="6.5">Thin hex split-clamp · Allen set screw · no thread damage</text>

  <!-- 5. Thread section -->
  <line x1="167" y1="165" x2="200" y2="158" stroke="#D8DCF0" stroke-width="0.75" marker-end="url(#arr-sm)"/>
  <line x1="200" y1="158" x2="372" y2="158" stroke="#D8DCF0" stroke-width="0.45" opacity="0.3"/>
  <text x="202" y="155" fill="#C8D0E8" font-size="8" font-weight="bold">7/8–14 TPI EXTERNAL THREADS</text>
  <text x="202" y="164" fill="#7080A8" font-size="6.5">~1.5" engaged · standard press thread</text>

  <!-- 6. Chamfer + entry -->
  <line x1="159" y1="210" x2="200" y2="207" stroke="#D8DCF0" stroke-width="0.75" marker-end="url(#arr-sm)"/>
  <line x1="200" y1="207" x2="372" y2="207" stroke="#D8DCF0" stroke-width="0.45" opacity="0.3"/>
  <text x="202" y="204" fill="#C8D0E8" font-size="8" font-weight="bold">CASE ENTRY  ·  45° CHAMFER</text>
  <text x="202" y="213" fill="#7080A8" font-size="6.5">Brass case mouth enters from below</text>

</g>

<!-- Bore callout — left side -->
<line x1="145" y1="178" x2="108" y2="222"
      stroke="#D8DCF0" stroke-width="0.75" stroke-dasharray="4,2" marker-end="url(#arr-sm)"/>
<line x1="10" y1="226" x2="108" y2="226" stroke="#D8DCF0" stroke-width="0.45" opacity="0.3"/>
<text x="12" y="223" fill="#C8D0E8" font-size="7.5" font-weight="bold"
      font-family="Arial Narrow, Arial, sans-serif">BORE — HIDDEN LINE</text>
<text x="12" y="231" fill="#7080A8" font-size="6"
      font-family="Arial Narrow, Arial, sans-serif">Expander ball + decapping pin inside</text>

<!-- ═══ TITLE BLOCK ═══════════════════════ -->
<line x1="0" y1="268" x2="380" y2="268" stroke="#D8DCF0" stroke-width="0.35" opacity="0.2"/>
<rect x="0" y="268" width="380" height="27" fill="#12121A"/>
<text x="10" y="279" fill="#404A70" font-size="5.8"
      font-family="Arial Narrow, Arial, sans-serif">MATERIAL: STEEL · FINISH: MATTE SATIN · ALL FEATURES SYMMETRIC ABOUT ℄</text>
<text x="10" y="289" fill="#404A70" font-size="5.8"
      font-family="Arial Narrow, Arial, sans-serif">STANDARD: ANSI Y14.5M · LINE TYPES: ANSI Y14.2 · ALL DIMS INCHES</text>
<text x="370" y="279" text-anchor="end" fill="#404A70" font-size="5.8"
      font-family="Arial Narrow, Arial, sans-serif">SCALE: NTS · DWG-001</text>
<text x="370" y="289" text-anchor="end" fill="#404A70" font-size="5.8"
      font-family="Arial Narrow, Arial, sans-serif">.308 WIN RELOADING GUIDE</text>

</svg>
</body></html>
